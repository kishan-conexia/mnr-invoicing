<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Invoices</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; color: #222; }
  header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e2e2; }
  header h1 { font-size: 16px; margin: 0; }
  nav { display: flex; gap: 16px; margin-top: 4px; }
  nav a { font-size: 13px; color: #1a73e8; text-decoration: none; }
  nav a.active { font-weight: 600; text-decoration: underline; }
  .who { font-size: 13px; color: #666; margin-right: 12px; }
  header button { background: none; border: 1px solid #ccc; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  main { padding: 32px; max-width: 1000px; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar h2 { font-size: 18px; margin: 0; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  th, td { text-align: left; padding: 10px 14px; font-size: 14px; border-bottom: 1px solid #eee; }
  th { background: #fafafa; color: #555; font-weight: 500; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: #f8f9fb; }
  #newBtn { background: #1a73e8; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
  .searchBox { width: 280px; max-width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; margin-bottom: 14px; box-sizing: border-box; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .badge.FINALIZED { background: #fff4d6; color: #916a00; }
  .badge.PAID { background: #d9f5df; color: #14742f; }
  .badge.PARTIALLY_PAID { background: #dbeaff; color: #1a4fa0; }
  .badge.OVERDUE { background: #fde0e0; color: #a11e1e; }
  .badge.CANCELLED { background: #eee; color: #777; }
  .rowActions { display: flex; gap: 10px; align-items: center; }
  .rowActions a, .rowActions button.iconBtn { color: #666; text-decoration: none; display: inline-flex; align-items: center; padding: 0; background: none; border: none; cursor: pointer; }
  .rowActions a:hover, .rowActions button.iconBtn:hover { color: #1a73e8; }
</style>
</head>
<body>
<main>
    <div class="toolbar">
      <h2>Invoices</h2>
      <a id="newBtn" href="/invoice-new.html">+ Create invoice</a>
    </div>
    <input type="text" id="searchInput" class="searchBox" placeholder="Search invoices by number, customer, status…">
    <table>
      <thead>
        <tr><th>Invoice #</th><th>Customer</th><th>Date</th><th>Due date</th><th>Total (₹)</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody id="invoiceRows"></tbody>
    </table>
  </main>
  <script src="app-shell.js"></script>
  <script src="header-logo.js"></script>
  <script src="invoices.js"></script>
</body>
</html>
