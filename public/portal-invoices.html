<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Your Invoices</title>
<link rel="stylesheet" href="portal-theme.css">
</head>
<body>
<main>
    <div class="sectionCard" id="issueInvoiceSection" style="display:none;">
      <div class="cardHeaderRow">
        <h3>Invoices You've Issued</h3>
        <a class="btn-primary" id="createInvoiceBtn" href="/portal-invoice-new.html">+ Create invoice for your downline</a>
      </div>
      <div class="gateNote" id="gateNote" style="display:none;"></div>
      <table>
        <thead><tr><th>Invoice #</th><th>Billed to</th><th>Date</th><th class="num">Total (₹)</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="issuedInvoiceRows"></tbody>
      </table>
    </div>

    <div class="sectionCard">
      <h3>Invoices Billed To You</h3>
      <table>
        <thead><tr><th>Invoice #</th><th>Date</th><th>Due date</th><th class="num">Total (₹)</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="invoiceRows"></tbody>
      </table>
    </div>
  </main>
  <script src="portal-nav.js"></script>
  <script src="portal-common.js"></script>
  <script src="portal-invoices.js"></script>
</body>
</html>
