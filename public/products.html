<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Products & Services</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; color: #222; }
  header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e2e2; }
  header h1 { font-size: 16px; margin: 0; }
  nav { display: flex; gap: 16px; margin-top: 4px; }
  nav a { font-size: 13px; color: #1a73e8; text-decoration: none; }
  nav a.active { font-weight: 600; text-decoration: underline; }
  .who { font-size: 13px; color: #666; margin-right: 12px; }
  header button { background: none; border: 1px solid #ccc; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  main { padding: 32px; max-width: 1000px; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar h2 { font-size: 18px; margin: 0; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  th, td { text-align: left; padding: 10px 14px; font-size: 14px; border-bottom: 1px solid #eee; }
  th { background: #fafafa; color: #555; font-weight: 500; }
  #addBtn { background: #1a73e8; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; }
  .searchBox { width: 280px; max-width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; margin-bottom: 14px; box-sizing: border-box; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
  .modal { background: white; padding: 24px; border-radius: 10px; width: 340px; }
  .modal label { display: block; font-size: 13px; margin-bottom: 4px; }
  .modal input, .modal select { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  .modal .cancel { background: #eee; }
  .modal .save { background: #1a73e8; color: white; }
  #modalError { color: #d33; font-size: 13px; margin-top: 4px; display: none; }
</style>
</head>
<body>
<main>
    <div class="toolbar">
      <h2>Products &amp; Services</h2>
      <button id="addBtn">+ Add service</button>
    </div>
    <input type="text" id="searchInput" class="searchBox" placeholder="Search services by name, code, HSN/SAC…">
    <table>
      <thead>
        <tr><th>Code</th><th>Name</th><th>HSN/SAC</th><th>Unit</th><th>Rate (₹)</th><th>Tax</th><th>Billing</th></tr>
      </thead>
      <tbody id="productRows"></tbody>
    </table>
  </main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 style="margin-top:0">Add service</h3>
      <label>Service code</label>
      <input id="f_code" placeholder="SVC-BB-200">
      <label>Name</label>
      <input id="f_name" placeholder="Broadband 200 Mbps">
      <label>HSN/SAC code (optional)</label>
      <input id="f_hsn" placeholder="998422">
      <label>Unit</label>
      <input id="f_unit" value="NOS">
      <label>Standard rate (₹)</label>
      <input id="f_rate" type="number" step="0.01" placeholder="999">
      <label>Tax rate</label>
      <select id="f_tax"></select>
      <label>Billing frequency (optional)</label>
      <select id="f_freq">
        <option value="">— One-time charge —</option>
        <option value="MONTHLY">Monthly</option>
        <option value="QUARTERLY">Quarterly</option>
        <option value="HALF_YEARLY">Half-yearly</option>
        <option value="YEARLY">Yearly</option>
      </select>
      <div id="modalError"></div>
      <div class="actions">
        <button class="cancel" id="cancelBtn">Cancel</button>
        <button class="save" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script src="app-shell.js"></script>
  <script src="header-logo.js"></script>
  <script src="products.js"></script>
</body>
</html>
