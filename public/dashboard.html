<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Customers</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; color: #222; }
  header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e2e2; }
  header h1 { font-size: 16px; margin: 0; }
  nav { display: flex; gap: 16px; margin-top: 4px; }
  nav a { font-size: 13px; color: #1a73e8; text-decoration: none; }
  nav a.active { font-weight: 600; text-decoration: underline; }
  .who { font-size: 13px; color: #666; margin-right: 12px; }
  header button { background: none; border: 1px solid #ccc; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  main { padding: 32px; max-width: 900px; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar h2 { font-size: 18px; margin: 0; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  th, td { text-align: left; padding: 10px 14px; font-size: 14px; border-bottom: 1px solid #eee; }
  th { background: #fafafa; color: #555; font-weight: 500; }
  #addBtn { background: #1a73e8; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; }
  .searchBox { width: 280px; max-width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; margin-bottom: 14px; box-sizing: border-box; }
  .editLink { color: #1a73e8; background: none; border: none; cursor: pointer; font-size: 13px; padding: 0; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
  .modal { background: white; padding: 28px; border-radius: 10px; width: 640px; max-width: 92vw; max-height: 88vh; overflow-y: auto; }
  .modal label { display: block; font-size: 13px; margin-bottom: 4px; }
  .modal input, .modal select { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
  .modal .row { display: flex; gap: 16px; }
  .modal .row > div { flex: 1; min-width: 0; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  .modal .cancel { background: #eee; }
  .modal .save { background: #1a73e8; color: white; }
  #modalError { color: #d33; font-size: 13px; margin-top: 4px; display: none; }
  .fieldError { color: #d33; font-size: 12px; margin: -8px 0 10px; display: none; }
  .modal input.invalid { border-color: #d33; background: #fff6f6; }
</style>
</head>
<body>
<main>
    <div class="toolbar">
      <h2>Customers</h2>
      <div style="display:flex; gap:10px;">
        <a href="/hierarchy.html" style="align-self:center; font-size:13px; color:#1a73e8; text-decoration:none;">View hierarchy tree →</a>
        <a href="/portal-login.html" target="_blank" style="align-self:center; font-size:13px; color:#1a73e8; text-decoration:none;">Open customer portal →</a>
        <button id="addBtn">+ Add customer</button>
      </div>
    </div>
    <input type="text" id="searchInput" class="searchBox" placeholder="Search customers by name, code, GSTIN, state…">
    <table>
      <thead>
        <tr><th>Code</th><th>Display Name</th><th>Tier</th><th>Parent</th><th>Name</th><th>GSTIN</th><th>State</th><th></th></tr>
      </thead>
      <tbody id="customerRows"></tbody>
    </table>
  </main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 style="margin-top:0" id="modalTitle">Add customer</h3>
      <input type="hidden" id="f_id">

      <div class="row">
        <div>
          <label>Customer code</label>
          <input id="f_code" placeholder="CUST-0004">
        </div>
        <div>
          <label>Tier</label>
          <select id="f_tier">
            <option value="DISTRIBUTOR_L1">Distributor L1 (reports to MNR)</option>
            <option value="DISTRIBUTOR_L2">Distributor L2</option>
            <option value="PARTNER">Partner</option>
            <option value="CUSTOMER" selected>Customer</option>
          </select>
        </div>
      </div>

      <div id="parentFieldWrap">
        <label id="parentLabel">Parent</label>
        <select id="f_parent"></select>
        <div class="fieldError" id="parentError"></div>
      </div>

      <div class="row">
        <div>
          <label>Contact / person name</label>
          <input id="f_name" placeholder="Customer name">
        </div>
        <div>
          <label>Company name (optional)</label>
          <input id="f_company">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Display name (required — this is what shows on invoices)</label>
          <select id="f_displayName"></select>
          <div class="fieldError" id="displayNameError"></div>
        </div>
        <div>
          <label>GSTIN (optional)</label>
          <input id="f_gstin" placeholder="27AAAAA0000A1Z5" maxlength="15">
          <div class="fieldError" id="gstinError"></div>
        </div>
      </div>

      <div class="row">
        <div>
          <label>State (required for GST calculation)</label>
          <select id="f_state"></select>
        </div>
        <div></div>
      </div>

      <h4 style="margin: 14px 0 8px;">Billing address</h4>
      <div class="row">
        <div>
          <label>Address line 1</label>
          <input id="b_line1" placeholder="Shop 4, MG Road">
        </div>
        <div>
          <label>City</label>
          <input id="b_city" placeholder="Pune">
        </div>
        <div>
          <label>Pincode</label>
          <input id="b_pincode" placeholder="411001" maxlength="6">
          <div class="fieldError" id="bPincodeError"></div>
        </div>
      </div>

      <label style="display:flex; align-items:center; gap:6px; margin: 14px 0 8px;">
        <input type="checkbox" id="sameAsBilling" checked style="width:auto; margin:0;">
        Installation address is the same as billing
      </label>
      <div id="installationFields" style="display:none;">
        <div class="row">
          <div>
            <label>Installation address line 1</label>
            <input id="i_line1" placeholder="Same building, ground floor">
          </div>
          <div>
            <label>City</label>
            <input id="i_city">
          </div>
          <div>
            <label>Pincode</label>
            <input id="i_pincode" maxlength="6">
            <div class="fieldError" id="iPincodeError"></div>
          </div>
        </div>
      </div>

      <h4 style="margin: 14px 0 8px;">Portal access <span style="font-weight:400; color:#888; font-size:11px;">(optional — lets this customer log in themselves)</span></h4>
      <div class="row">
        <div>
          <label>Portal login email</label>
          <input id="f_portalEmail" type="email" placeholder="owner@customer-company.com">
        </div>
        <div>
          <label>Set / reset portal password <span id="portalPasswordHint" style="font-weight:400; color:#888;">(leave blank to keep unchanged)</span></label>
          <input id="f_portalPassword" type="password" placeholder="At least 8 characters" autocomplete="new-password">
        </div>
      </div>
      <div class="fieldError" id="portalError"></div>

      <div id="modalError"></div>
      <div class="actions">
        <button class="cancel" id="cancelBtn">Cancel</button>
        <button class="save" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script src="app-shell.js"></script>
  <script src="header-logo.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
