<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Dashboard</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; color: #222; }
  header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e2e2; }
  header h1 { font-size: 16px; margin: 0; }
  nav { display: flex; gap: 16px; margin-top: 4px; }
  nav a { font-size: 13px; color: #1a73e8; text-decoration: none; }
  nav a.active { font-weight: 600; text-decoration: underline; }
  .who { font-size: 13px; color: #666; margin-right: 12px; }
  header button { background: none; border: 1px solid #ccc; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  main { padding: 32px; max-width: 1100px; margin: 0 auto; }

  .kpiGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpiCard { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .kpiCard .label { font-size: 12px; color: #777; margin-bottom: 6px; }
  .kpiCard .value { font-size: 20px; font-weight: 700; }
  .kpiCard.overdue .value { color: #a11e1e; }
  .kpiCard.received .value { color: #14742f; }

  .grid2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card h3 { font-size: 14px; margin: 0 0 14px; }

  .barChart { display: flex; align-items: flex-end; gap: 12px; height: 160px; padding-top: 10px; }
  .barChart .bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .barChart .barFill { width: 100%; background: #1a73e8; border-radius: 4px 4px 0 0; min-height: 2px; }
  .barChart .barLabel { font-size: 11px; color: #777; margin-top: 6px; text-align: center; }
  .barChart .barValue { font-size: 10px; color: #333; margin-bottom: 4px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 6px; font-size: 13px; border-bottom: 1px solid #eee; }
  th { color: #777; font-weight: 500; font-size: 12px; }
  .num { text-align: right; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: #f8f9fb; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.FINALIZED { background: #fff4d6; color: #916a00; }
  .badge.PAID { background: #d9f5df; color: #14742f; }
  .badge.PARTIALLY_PAID { background: #dbeaff; color: #1a4fa0; }
  .badge.OVERDUE { background: #fde0e0; color: #a11e1e; }
  .empty { color: #999; font-size: 13px; padding: 10px 0; }
</style>
</head>
<body>
<main>
    <div class="kpiGrid" id="kpiGrid"></div>

    <div class="grid2">
      <div class="card">
        <h3>Monthly Revenue (last 6 months)</h3>
        <div class="barChart" id="revenueChart"></div>
      </div>
      <div class="card">
        <h3>Customers with Highest Outstanding</h3>
        <table>
          <tbody id="topOutstandingRows"></tbody>
        </table>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>Recently Created Invoices</h3>
        <table>
          <thead><tr><th>Invoice #</th><th>Customer</th><th class="num">Total</th><th>Status</th></tr></thead>
          <tbody id="recentInvoicesRows"></tbody>
        </table>
      </div>
      <div class="card">
        <h3>Recently Received Payments</h3>
        <table>
          <thead><tr><th>Customer</th><th class="num">Amount</th><th>Mode</th></tr></thead>
          <tbody id="recentPaymentsRows"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="app-shell.js"></script>
  <script src="header-logo.js"></script>
  <script src="home.js"></script>
</body>
</html>
