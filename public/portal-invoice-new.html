<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Create Invoice</title>
<link rel="stylesheet" href="portal-theme.css">
<style>
  .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin: 0 0 16px; }
  .row { display: flex; gap: 16px; margin-bottom: 14px; }
  .row > div { flex: 1; }
  label { display: block; font-size: 13px; margin-bottom: 4px; color: #444; }
  input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  th, td { text-align: left; padding: 6px 8px; font-size: 13px; }
  th { color: #666; font-weight: 500; }
  .num { text-align: right; }
  #addLineBtn { background: #eee; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .removeBtn { background: none; border: none; color: #d33; cursor: pointer; font-size: 16px; }
  .summary { margin-top: 16px; width: 320px; margin-left: auto; }
  .summary div { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .summary .total { font-weight: 700; font-size: 16px; border-top: 1px solid #ddd; margin-top: 6px; padding-top: 8px; }
  #saveBtn { background: #1a73e8; color: white; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
  #errorBox { color: #d33; font-size: 13px; margin-top: 10px; display: none; }
  .gateBlock { text-align: center; padding: 40px; color: #a11e1e; font-size: 14px; }
</style>
</head>
<body>
<main>
    <div id="gateBlock" class="card gateBlock" style="display:none;"></div>

    <div id="formArea" style="display:none;">
      <div class="card">
        <h2>Create Invoice for Your Downline</h2>
        <div class="row">
          <div>
            <label>Bill to</label>
            <select id="f_customer"></select>
          </div>
          <div>
            <label>Invoice date</label>
            <input type="date" id="f_invoiceDate">
          </div>
          <div>
            <label>Due date</label>
            <input type="date" id="f_dueDate">
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Line items</h2>
        <table>
          <thead>
            <tr>
              <th style="width:28%">Service</th>
              <th style="width:12%">Qty</th>
              <th style="width:16%">Rate (₹)</th>
              <th style="width:12%">Disc %</th>
              <th style="width:12%">Tax %</th>
              <th style="width:16%" class="num">Line total (₹)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <button id="addLineBtn">+ Add line</button>

        <div class="summary">
          <div><span>Subtotal</span><span id="s_subtotal">₹0.00</span></div>
          <div><span>Taxable value</span><span id="s_taxable">₹0.00</span></div>
          <div id="s_cgstRow"><span>CGST</span><span id="s_cgst">₹0.00</span></div>
          <div id="s_sgstRow"><span>SGST</span><span id="s_sgst">₹0.00</span></div>
          <div id="s_igstRow"><span>IGST</span><span id="s_igst">₹0.00</span></div>
          <div class="total"><span>Total</span><span id="s_total">₹0.00</span></div>
        </div>

        <div id="errorBox"></div>
        <div style="margin-top: 16px; text-align: right;">
          <button id="saveBtn">Save &amp; finalize invoice</button>
        </div>
      </div>
    </div>
  </main>
  <script src="portal-nav.js"></script>
  <script src="portal-invoice-new.js"></script>
</body>
</html>
