<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNR Broadband — Hierarchy</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { font-family: -apple-system, sans-serif; background: #f4f5f7; margin: 0; color: #222; }
  header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e2e2; }
  header h1 { font-size: 16px; margin: 0; }
  nav { display: flex; gap: 16px; margin-top: 4px; }
  nav a { font-size: 13px; color: #1a73e8; text-decoration: none; }
  .who { font-size: 13px; color: #666; margin-right: 12px; }
  header button { background: none; border: 1px solid #ccc; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  main { padding: 32px; max-width: 800px; margin: 0 auto; }
  .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card h2 { font-size: 16px; margin: 0 0 6px; }
  .card .sub { font-size: 13px; color: #777; margin-bottom: 20px; }

  .tree { list-style: none; padding-left: 0; }
  .tree ul { list-style: none; padding-left: 26px; border-left: 1px dashed #ccc; margin: 4px 0 4px 10px; }
  .tree li { margin: 6px 0; }
  .node { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; background: #f8f9fb; }
  .node .tierBadge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 9px; text-transform: uppercase; letter-spacing: 0.3px; }
  .tierBadge.ROOT { background: #333; color: white; }
  .tierBadge.DISTRIBUTOR_L1 { background: #dbeaff; color: #1a4fa0; }
  .tierBadge.DISTRIBUTOR_L2 { background: #e3d9ff; color: #5b3ea6; }
  .tierBadge.PARTNER { background: #fff4d6; color: #916a00; }
  .tierBadge.CUSTOMER { background: #d9f5df; color: #14742f; }
  .node .nodeName { font-size: 13px; font-weight: 600; }
  .node .nodeCode { font-size: 11px; color: #999; }
  .empty { color: #999; font-size: 13px; }
</style>
</head>
<body>
<main>
    <div class="card">
      <h2>Distribution Hierarchy</h2>
      <div class="sub">Company (MNR) → Distributor L1 → Distributor L2 → Partner → Customer</div>
      <ul class="tree" id="tree"></ul>
    </div>
  </main>
  <script src="app-shell.js"></script>
  <script src="header-logo.js"></script>
  <script src="hierarchy.js"></script>
</body>
</html>
